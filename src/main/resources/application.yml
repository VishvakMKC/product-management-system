spring:
  application:
    name: Product Management System
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
  
  session:
    store-type: redis
    timeout: 30m

server:
  port: 8082

